name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Verify tag and source versions
        shell: bash
        run: |
          VERSION="$(php tools/verify-release.php --source "$GITHUB_WORKSPACE")"
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Run quality checks
        run: composer check

      - name: Build verified release
        shell: bash
        run: |
          composer build-release
          test -f "dist/dr-slon-toolkit-${GITHUB_REF_NAME#v}.zip"

      - name: Upload verified ZIP
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dr-slon-toolkit-release
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified ZIP
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dr-slon-toolkit-release
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/dr-slon-toolkit-$VERSION.zip" \
            --verify-tag \
            --generate-notes \
            --title "Dr.Slon Toolkit $VERSION"
